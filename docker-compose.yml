services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hackathon_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    depends_on:
      - postgres

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile.dev
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - apps/backend/.env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/hackathon_db?schema=public
      REDIS_URL: redis://redis:6379
      NODE_ENV: development
    depends_on:
      - redis
    volumes:
      - ./apps/backend/src:/app/apps/backend/src
      - ./apps/backend/prisma:/app/apps/backend/prisma

  ui:
    build:
      context: .
      dockerfile: apps/ui/Dockerfile.dev
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:3000
    depends_on:
      - backend
    volumes:
      - ./apps/ui/src:/app/apps/ui/src
      - ./apps/ui/public:/app/apps/ui/public

volumes:
  postgres_data:
