  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile.dev
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - apps/backend/.env
    environment:
      DATABASE_URL: postgresql://postgres.xeqisokaznkxmgqdqxrf:aZZO7q2N0q1KqCP1@aws-1-eu-west-2.pooler.supabase.com:5432/postgres
      NODE_ENV: development
    # depends_on:
    #   postgres:
    #     condition: service_healthy
    volumes:
      - ./apps/backend/src:/app/apps/backend/src
      - ./apps/backend/prisma:/app/apps/backend/prisma

  ui:
    build:
      context: .
      dockerfile: apps/ui/Dockerfile.dev
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:3000
    depends_on:
      - backend
    volumes:
      - ./apps/ui/src:/app/apps/ui/src
      - ./apps/ui/public:/app/apps/ui/public

volumes:
  postgres_data:
